<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geocatcher - Live Radar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background: #111; }
        #map { width: 100%; height: 65vh; }
        
        #radar-panel { 
            width: 100%; height: 35vh; 
            background: rgba(26, 26, 46, 0.85); 
            backdrop-filter: blur(10px);
            border-top: 2px solid rgba(100, 255, 218, 0.3);
            color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 15px; box-sizing: border-box; text-align: center;
        }

        #leaderboard {
            position: absolute; top: 20px; right: 20px; width: 220px;
            background: rgba(26, 26, 46, 0.85); backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 255, 218, 0.5);
            padding: 15px; border-radius: 12px; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .status-badge { font-size: 20px; font-weight: bold; padding: 8px 25px; border-radius: 30px; margin-bottom: 6px; text-transform: uppercase; }
        .freezing { background-color: #007bff; }
        .warm { background-color: #fd7e14; }
        .burning { background-color: #dc3545; animation: pulse 1s infinite; }
        
        .claim-btn { 
            display: none; background: linear-gradient(135deg, #00e676, #00bfa5);
            color: #000; border: none; padding: 12px 35px; font-size: 16px; font-weight: bold; 
            border-radius: 25px; cursor: pointer; margin-top: 15px;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="leaderboard">
        <h3 style="margin-top:0; color:#64ffda; font-size: 16px;">Top Explorers</h3>
        <ul id="leaderboard-list" style="list-style: none; padding: 0; font-size: 14px; color: #fff;">
            <li>Loading...</li>
        </ul>
    </div>

    <div id="radar-panel">
        <div id="radar-status" class="status-badge freezing">RADAR READY</div>
        <div id="radar-distance" style="color: #e0e0e0;">Syncing with satellites...</div>
        <button id="claim-button" class="claim-btn">LOG VISIT & CLAIM</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Initialize Map
        const map = L.map('map').setView([28.02, 73.31], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let userMarker = null;
        let isFirstLock = true;
        let treasures = []; 
        let closestTreasure = null; // Remembers which treasure you are closest to

        // 2. Fetch Treasures
        fetch('/api/treasures')
            .then(res => res.json())
            .then(data => {
                treasures = data; 
                data.forEach(t => {
                    L.marker([t.lat, t.lng]).addTo(map).bindPopup(t.riddle);
                });
            });

        // 3. Update Leaderboard
        function updateLeaderboard() {
            fetch('/api/leaderboard')
                .then(res => res.json())
                .then(data => {
                    const list = document.getElementById('leaderboard-list');
                    list.innerHTML = '';
                    data.forEach(entry => {
                        const li = document.createElement('li');
                        li.innerText = `${entry.username}: ${entry.count} found`;
                        list.appendChild(li);
                    });
                })
                .catch(() => { document.getElementById('leaderboard-list').innerText = "Offline"; });
        }
        updateLeaderboard();

        // 4. GPS Tracking & Radar Logic
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition((position) => {
                const { latitude, longitude } = position.coords;

                if (!userMarker) {
                    userMarker = L.circleMarker([latitude, longitude], { 
                        color: '#00ff00', fillColor: '#00ff00', fillOpacity: 1, radius: 12 
                    }).addTo(map);
                } else {
                    userMarker.setLatLng([latitude, longitude]);
                }
                userMarker.bringToFront();
                
                if (isFirstLock) {
                    map.setView([latitude, longitude], 17);
                    isFirstLock = false;
                }

                if (treasures.length > 0) {
                    let shortestDistance = Infinity;

                    treasures.forEach(t => {
                        let dist = map.distance([latitude, longitude], [t.lat, t.lng]);
                        if (dist < shortestDistance) {
                            shortestDistance = dist;
                            closestTreasure = t; // Save the closest treasure object
                        }
                    });

                    const distanceMeters = Math.round(shortestDistance);
                    document.getElementById('radar-distance').innerText = `Nearest cache is ${distanceMeters} meters away`;

                    const statusBadge = document.getElementById('radar-status');
                    const claimBtn = document.getElementById('claim-button');

                    if (distanceMeters <= 20) {
                        statusBadge.innerText = "BURNING HOT!";
                        statusBadge.className = "status-badge burning";
                        claimBtn.style.display = "block";
                    } else if (distanceMeters <= 100) {
                        statusBadge.innerText = "WARMING UP";
                        statusBadge.className = "status-badge warm";
                        claimBtn.style.display = "none";
                    } else {
                        statusBadge.innerText = "FREEZING COLD";
                        statusBadge.className = "status-badge freezing";
                        claimBtn.style.display = "none";
                    }
                }
            });
        }

        // 5. CLAIM BUTTON LOGIC
        document.getElementById('claim-button').addEventListener('click', () => {
            if (!closestTreasure) return;

            const username = prompt("?? You found it! Enter your Explorer Name:");
            
            if (username) {
                // Send the data to your backend
                fetch('/api/claim', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: username, 
                        lat: closestTreasure.lat,
                        lng: closestTreasure.lng
                    })
                })
                .then(res => res.json())
                .then(data => {
                    alert("?? Treasure Logged Successfully!");
                    document.getElementById('claim-button').style.display = "none"; // Hide button so they can't spam it
                    updateLeaderboard(); // Refresh the leaderboard
                })
                .catch(err => {
                    alert("Error saving claim to the database. Check console.");
                    console.error(err);
                });
            }
        });
    </script>
</body>
</html>
