<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geocatcher - Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #map {
            width: 100%;
            height: 100vh;
        }
        .loading-title {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="loading-title">?? Geocatcher Live Radar</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Initialize the Map canvas centered globally
        const map = L.map('map').setView([20.0, 0.0], 2);

        // 2. Load free open-source map design tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // 3. Try to locate the player's live device location
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((position) => {
                const userLat = position.coords.latitude;
                const userLng = position.coords.longitude;
                
                // Center map automatically to player's neighborhood
                map.setView([userLat, userLng], 13);

                // Add a unique blue circle representing the actual player
                L.circle([userLat, userLng], {
                    color: '#007bff',
                    fillColor: '#007bff',
                    fillOpacity: 0.4,
                    radius: 30
                }).addTo(map).bindPopup("<b>You are here!</b>").openPopup();
            });
        }

        // 4. Connect to your live backend database endpoint
        fetch('/api/treasures')
            .then(response => response.json())
            .then(treasures => {
                treasures.forEach(treasure => {
                    // Pull coordinates and riddle text safely
                    const lat = treasure.lat;
                    const lng = treasure.lng;
                    const riddle = treasure.riddle;

                    if (lat && lng) {
                        // Drop a visual game pin onto the map layout
                        L.marker([lat, lng])
                            .addTo(map)
                            .bindPopup(`
                                <div style="font-size:14px; text-align:center;">
                                    <b>????? Hidden Cache</b><br><br>
                                    <i>"${riddle}"</i>
                                </div>
                            `);
                    }
                });
            })
            .catch(err => console.error("Error loading geocaches:", err));
    </script>
</body>
</html>
