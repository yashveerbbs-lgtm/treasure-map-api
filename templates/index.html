<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geocatcher - Live Radar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background: #111; }
        #map { width: 100%; height: 65vh; }
        
        /* Glassmorphic UI */
        #radar-panel { 
            width: 100%; height: 35vh; 
            background: rgba(26, 26, 46, 0.85); 
            backdrop-filter: blur(10px);
            border-top: 2px solid rgba(100, 255, 218, 0.3);
            color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 15px; box-sizing: border-box; text-align: center;
        }

        #leaderboard {
            position: absolute; top: 20px; right: 20px; width: 220px;
            background: rgba(26, 26, 46, 0.85); backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 255, 218, 0.5);
            padding: 15px; border-radius: 12px; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .status-badge { font-size: 20px; font-weight: bold; padding: 8px 25px; border-radius: 30px; margin-bottom: 6px; text-transform: uppercase; }
        .freezing { background-color: #007bff; }
        .warm { background-color: #fd7e14; }
        .burning { background-color: #dc3545; animation: pulse 1s infinite; }
        
        .claim-btn { 
            display: none; background: linear-gradient(135deg, #00e676, #00bfa5);
            color: #000; border: none; padding: 12px 35px; font-size: 16px; font-weight: bold; 
            border-radius: 25px; cursor: pointer; box-shadow: 0 0 15px rgba(0, 230, 118, 0.4);
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="leaderboard">
        <h3 style="margin-top:0; color:#64ffda; font-size: 16px;">Top Explorers</h3>
        <ul id="leaderboard-list" style="list-style: none; padding: 0; font-size: 14px; color: #fff;">
            <li>Loading...</li>
        </ul>
    </div>

    <div id="radar-panel">
        <div id="radar-status" class="status-badge freezing">?? Initializing Radar...</div>
        <div id="radar-distance" style="color: #e0e0e0;">Searching for satellite GPS...</div>
        <button id="claim-button" class="claim-btn">????? LOG VISIT & CLAIM</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ... (Keep your existing map setup, calculateDistance, and loadCachesFromDatabase logic here) ...

        function updateLeaderboard() {
            fetch('/api/leaderboard')
                .then(res => res.json())
                .then(data => {
                    const list = document.getElementById('leaderboard-list');
                    list.innerHTML = '';
                    data.forEach(entry => {
                        const li = document.createElement('li');
                        li.innerText = `${entry.username}: ${entry.count} found`;
                        list.appendChild(li);
                    });
                })
                .catch(() => { document.getElementById('leaderboard-list').innerText = "Offline"; });
        }

        // Add this to your existing load success block
        updateLeaderboard(); 
        
        // ... (Keep the rest of your existing JS logic) ...
    </script>
</body>
</html>
