<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treasure Map Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .riddle-popup { font-size: 14px; width: 200px; }
        .riddle-popup input { width: 90%; margin-top: 5px; padding: 5px; }
        .riddle-popup button { margin-top: 8px; width: 100%; padding: 5px; background: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize the map centered globally
        const map = L.map('map').setView([20.5937, 78.9629], 5);

        // Load open-source map tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Fetch existing treasures from Python backend on load
        async function loadTreasures() {
            const response = await fetch('/api/treasures');
            const treasures = await response.json();
            
            treasures.forEach(t => {
                L.marker([t.lat, t.lng]).addTo(map)
                    .bindPopup(`<b>????? Treasure Found!</b><br>Riddle: ${t.riddle}`);
            });
        }
        loadTreasures();

        // Click on map to drop a pin and save a new treasure riddle
        map.on('click', function(e) {
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;

            const popupContent = `
                <div class="riddle-popup">
                    <b>Hide a Treasure Here!</b><br>
                    <input type="text" id="riddleInput" placeholder="Enter riddle or clue...">
                    <button onclick="saveTreasure(${lat}, ${lng})">Save to Cloud</button>
                </div>
            `;

            L.popup()
                .setLatLng(e.latlng)
                .setContent(popupContent)
                .openOn(map);
        });

        // Send data to Flask backend -> Supabase
        async function saveTreasure(lat, lng) {
            const riddle = document.getElementById('riddleInput').value;
            if (!riddle) return alert('Please enter a riddle first!');

            const response = await fetch('/api/treasures', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ lat, lng, riddle })
            });

            if (response.ok) {
                L.marker([lat, lng]).addTo(map)
                    .bindPopup(`<b>Treasure Saved!</b><br>Riddle: ${riddle}`);
                map.closePopup();
            } else {
                alert('Error saving treasure to cloud.');
            }
        }
    </script>
</body>
</html>
