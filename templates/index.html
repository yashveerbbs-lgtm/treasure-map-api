<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geocatcher - Live Radar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #111;
        }
        #map {
            width: 100%;
            height: 70vh;
        }
        #radar-panel {
            width: 100%;
            height: 30vh;
            background: #1a1a2e;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.5);
            text-align: center;
            box-sizing: border-box;
            padding: 10px;
        }
        .status-badge {
            font-size: 24px;
            font-weight: bold;
            padding: 10px 25px;
            border-radius: 30px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .freezing { background-color: #007bff; text-shadow: 0 0 8px #0056b3; }
        .warm { background-color: #fd7e14; text-shadow: 0 0 8px #d94111; }
        .burning { background-color: #dc3545; animation: pulse 1s infinite; text-shadow: 0 0 8px #9c1c24; }
        
        .distance-text {
            font-size: 18px;
            color: #e0e0e0;
            margin: 5px 0;
        }
        .riddle-hint {
            font-size: 14px;
            color: #a0a0a5;
            font-style: italic;
            max-width: 80%;
        }
        .admin-note {
            font-size: 11px;
            color: #64ffda;
            margin-top: 5px;
            opacity: 0.8;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 10px #dc3545; }
            50% { transform: scale(1.04); box-shadow: 0 0 25px #dc3545; }
            100% { transform: scale(1); box-shadow: 0 0 10px #dc3545; }
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="radar-panel">
        <div id="radar-status" class="status-badge freezing">?? Initializing Radar...</div>
        <div id="radar-distance" class="distance-text">Searching for satellite GPS...</div>
        <div id="radar-hint" class="riddle-hint">Walk around your area to pick up cache anomalies.</div>
        <div class="admin-note">??? Developer Mode: Double-click anywhere on the map to drop a new Cache!</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([20.0, 0.0], 2);
        let userLocationMarker = null;
        let allTreasures = [];

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = 
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; 
        }

        // Fetch all cache items from your server
        function loadCachesFromDatabase() {
            fetch('/api/treasures')
                .then(response => response.json())
                .then(treasures => {
                    allTreasures = treasures;
                    
                    // Clear old pins before rendering fresh ones
                    map.eachLayer((layer) => {
                        if (layer instanceof L.Marker) {
                            map.removeLayer(layer);
                        }
                    });

                    treasures.forEach(treasure => {
                        if (treasure.lat && treasure.lng) {
                            L.marker([treasure.lat, treasure.lng])
                                .addTo(map)
                                .bindPopup(`<b>????? Cache Target</b><br>${treasure.riddle}`);
                        }
                    });
                })
                .catch(err => console.error("Database fetch exception error:", err));
        }

        function updateRadar(userLat, userLng) {
            if (allTreasures.length === 0) return;

            let closestTreasure = null;
            let shortestDistance = Infinity;

            allTreasures.forEach(treasure => {
                const distance = calculateDistance(userLat, userLng, treasure.lat, treasure.lng);
                if (distance < shortestDistance) {
                    shortestDistance = distance;
                    closestTreasure = treasure;
                }
            });

            const distanceDiv = document.getElementById('radar-distance');
            const statusDiv = document.getElementById('radar-status');
            const hintDiv = document.getElementById('radar-hint');

            if (shortestDistance === Infinity) return;

            distanceDiv.innerText = `Closest Cache: ${Math.round(shortestDistance)} meters away`;
            hintDiv.innerText = `Current Area Riddle: "${closestTreasure.riddle}"`;

            statusDiv.className = "status-badge"; 
            if (shortestDistance <= 20) {
                statusDiv.innerText = "?? Burning Hot! ??";
                statusDiv.classList.add("burning");
            } else if (shortestDistance <= 250) {
                statusDiv.innerText = "? Getting Warm ?";
                statusDiv.classList.add("warm");
            } else {
                statusDiv.innerText = "?? Freezing Cold ??";
                statusDiv.classList.add("freezing");
            }
        }

        // NEW: Double click event engine to dynamically insert data entries
        map.on('dblclick', function(e) {
            const clickedLat = e.latlng.lat;
            const clickedLng = e.latlng.lng;

            const riddleText = prompt("Enter a riddle or clue hint for this physical location:");
            
            if (riddleText) {
                // Post directly to your live API POST endpoint
                fetch('/api/treasures', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        lat: clickedLat,
                        lng: clickedLng,
                        riddle: riddleText
                    })
                })
                .then(res => res.json())
                .then(data => {
                    alert("Cache successfully hidden in Supabase!");
                    loadCachesFromDatabase(); // Refresh layout pins
                })
                .catch(err => alert("Error saving cache target: " + err));
            }
        });

        // Initialize core location loops
        loadCachesFromDatabase();

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition((position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;

                map.setView([lat, lng], 15);

                if (!userLocationMarker) {
                    userLocationMarker = L.circle([lat, lng], {
                        color: '#007bff', fillColor: '#007bff', fillOpacity: 0.4, radius: 25
                    }).addTo(map);
                } else {
                    userLocationMarker.setLatLng([lat, lng]);
                }

                updateRadar(lat, lng);
            }, (err) => console.error("GPS Error:", err), {
                enableHighAccuracy: true
            });
        }
    </script>
</body>
</html>
